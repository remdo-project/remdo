catalogMode: prefer

engineStrict: true

nodeVersion: 24.18.0

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - rollup@2.80.0
  - serialize-javascript@7.0.5
  - undici-types@6.21.0
  - semver@6.3.1

updateNotifier: false

updateConfig:
  ignoreDependencies:
    # TODO(deps): return to stable Better Auth after 1.7.0 ships with GHSA-p2fr-6hmx-4528 fixed.
    # Probe: npm view @better-auth/oauth-provider version
    - '@better-auth/core'
    - '@better-auth/oauth-provider'
    - better-auth
    # TODO(deps): retry Kysely 0.29 after Better Auth publishes its adapter fix.
    # Probe: npm view @better-auth/kysely-adapter version
    - kysely
    # TODO(deps): retry after Lexical 0.47 clears minimumReleaseAge; 0.46 fails editor invariants.
    # Probe: npm view lexical 'time[0.47.0]'
    - '@lexical/*'
    - lexical
    # TODO(deps): remove this hold when @typescript-eslint supports TypeScript 7.
    # Probe: pnpm view @typescript-eslint/parser peerDependencies --json
    - typescript

overrides:
  '@babel/plugin-transform-modules-systemjs': '>=7.29.4 <8'
  '@eslint/config-array>minimatch': 3.1.5
  '@eslint/eslintrc>ajv': 6.14.0
  '@eslint/eslintrc>minimatch': 3.1.5
  '@typescript-eslint/typescript-estree>minimatch': 9.0.7
  body-parser: 2.2.1
  esbuild: '>=0.28.1'
  eslint>ajv: 6.14.0
  eslint>minimatch: 3.1.5
  express: '>=5.2.0'
  fast-uri: '>=3.1.2'
  glob>minimatch: 10.2.4
  js-yaml: 4.2.0
  kysely: 0.28.17
  markdown-it: '>=14.2.0'
  qs: 6.15.2
  serialize-javascript: 7.0.5
  table>ajv: 8.18.0

