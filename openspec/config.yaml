schema: spec-driven

context: |
  RemDo is a collaborative, keyboard-first outliner built on TypeScript,
  React, Lexical, and Yjs. docs/documentation.md defines the documentation
  invariants. Main specs contain accepted durable product behavior; active
  changes contain proposed behavior, design, and implementation tasks.
  openspec/MIGRATION.md tracks which capabilities have moved out of docs/.
  openspec/MIGRATION-BACKLOG.md preserves accepted migration decisions until
  their permanent OpenSpec owners exist.

rules:
  proposal:
    - Keep the motivation and scope concise.
    - List only capabilities whose product requirements change; if the default schema requires a change-local capability for documentation or tooling work, mark it temporary and archive with --skip-specs.
  specs:
    - State observable product behavior, not implementation inventories.
    - Keep requirements scope-first and minimal; omit derivable detail.
    - Group closely related rules into one requirement; split behaviors that can change independently.
    - Before naming a product concept, consult the migration backlog and current docs/specs; reuse the established term and link its authoritative definition at first use.
    - Use the minimum scenarios needed to clarify outcomes and failure branches; do not restate the requirement.
    - Do not add known unimplemented behavior to a main spec; keep it in the active change until incorporation.
  design:
    - Record only decisions and rationale that prevent ambiguity or repeated relitigation.
  tasks:
    - Keep tasks verifiable and ordered by dependency.
    - For capability migrations, move accepted backlog decisions to their permanent owners, drop migration-only Avoid guidance, and remove incorporated entries.
