version: "1"
services:
- type: web
  name: remdo
  runtime: docker
  repo: https://github.com/remdo-project/remdo
  branch: main
  plan: starter
  region: frankfurt
  dockerContext: .
  dockerfilePath: ./docker/Dockerfile
  autoDeployTrigger: commit
  envVars:
    # Render injects PORT; the container binds it (else 8080). Do not pin it.
    # AUTH_SECRET and the Y-Sweet auth_key/server_token pair are bootstrapped
    # onto the persistent disk on first run, so they are not set here.
    - key: DATA_DIR
      value: /data
    - key: ADMIN_SECRET
      sync: false
    - key: APP_PUBLIC_URL
      sync: false
    - key: ALLOW_SIGNUP
      value: "false"
  disk:
    name: remdo-data
    mountPath: /data
    sizeGB: 1
