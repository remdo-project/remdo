version: 2
updates:
  # npm is the only ecosystem here. These PRs are alerts to run the deps-refresh
  # skill (which batches and test-gates every upgrade, incl. tooling pins and
  # GitHub Actions majors), not things merged individually. Default
  # open-pull-requests-limit (5) so pending work stays visible.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: sunday
    # Hold each version 2 days before proposing it, so PRs clear pnpm's
    # minimumReleaseAge gate and land green. Rationale (incl. why 2, not 1):
    # docs/dev/dependency-maintenance.md, "Dependabot".
    cooldown:
      default-days: 2
    groups:
      weekly-all:
        patterns:
          - "*"
