version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: sunday

    open-pull-requests-limit: 1

    ignore:
      - dependency-name: vite
        versions:
          - ">= 8.0.0 < 9.0.0"
      - dependency-name: "@eslint-react/eslint-plugin"
        versions:
          - ">= 4.0.0 < 5.0.0"
    groups:
      weekly-all:
        patterns:
          - "*"
