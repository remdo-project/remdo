version: 2
# These PRs are a weekly staleness reminder to run the deps-refresh skill, never
# merged per-dependency. The 9-day cooldown keeps the repo silent when refreshed
# on its weekly cadence. Rationale: docs/dev/dependency-maintenance.md, "Dependabot".
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 9
    groups:
      all:
        patterns:
          - "*"
