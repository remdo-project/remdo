name: Setup pnpm workspace
description: Configure pnpm and install dependencies
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24.17.x
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
